server:
  port: 0


spring:
  application:
    name: order-service

  #spring boot 2.x 에서 사용하는 zipkin설정
#  zipkin:
#    base-url: http://localhost:9411
#    enabled: true
#  sleuth:
#    sampler:
#      probability:1.0

  h2:
    console:
      enabled: true
      settings:
        web-allow-others: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
  datasource:
#    driver-class-name: org.h2.Driver
#    url: jdbc:h2:mem:order-db
#    username: sa
#    password: 921013
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/mydb?useSSL=false&allowPublicKeyRetrieval=true

    username: root
    password: 921013

eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://127.0.0.1:8761/eureka

logging:
  level:
    com.example.orderservice: DEBUG
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"  # 로그에 트레이스 ID와 스팬 ID 포함

management:
  tracing:
    sampling:
      probability: 1.0  # 모든 요청에 대해 추적 (프로덕션에서는 낮은 값 사용 권장, 예: 0.1)
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans  # Zipkin 서버 주소
  endpoints:
    web:
      exposure:
        include: refresh, health, beans, busrefresh, info, metrics, prometheus, httptrace